<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>projinfo WASM PROJ</title>


    <link rel="stylesheet" href="./projinfo.css" />

    <script src="./proj/wasm/projModule.js"></script>
    <script src="./proj/projFunctions.js"></script>

    <script src="./projinfo.js"></script>
</head>

<body>
    <div class="main-wrapper">
        <div id="loading-indicator">&#8987;</div>

        <div id="app-content" class="loading-state">
            <div class="full-width-section">
                <h2>projinfo with WASM PROJ</h2>
                <p class="description-text">
                    WASM JavaScript implementation of <a href="https://proj.org/apps/projinfo.html"
                        target="_blank">projinfo</a>
                    Command Line Application.
                    Implemented with <a href="https://proj.org" target="_blank">PROJ</a> <span id="proj-version"></span>
                    <br>
                    Look at the &gt; <a href="https://proj.org/apps/projinfo.html" target="_blank">PROJ documentation</a> &lt;
                    to know the correct parameters.
                </p>
            </div>
            <div class="container">
                <div class="column">
                    <label class="checkbox-label"
                        title="Enables querying with PROJ_NETWORK=ON. The results may differ in some cases.">
                        <input type="checkbox" id="use-network" checked> Enable network
                    </label>
                    <div class="textarea-container">
                        <button class="clear-btn" onclick="clearField('args-text')" title="Clear field">&times;</button>
                        <textarea id="args-text" class="mono-space" class="freetext-text" spellcheck="false"
                            placeholder="Type here the projinfo parameters"></textarea>
                    </div>

                    <hr class="section-divider">
                    <div class="action-area">
                        <button id="btn-transform" class="btn-transform">Run</button>
                    </div>
                    <div class="field">
                        <div class="flex-header">
                            <label>Return code: <spam id="rc"></spam></label>
                            <button class="btn-small" onclick="copyToClipboard('output-text', this)">Copy</button>
                        </div>
                        <div id="output-text" class="mono-space" readonly spellcheck="false" placeholder=""
                            style="min-height: 80px;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
