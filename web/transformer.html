<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJ Wasm transformer</title>

    <style>
        body {
            font-family: sans-serif;
            margin: 2em;
            background-color: #f4f4f4;
        }

        h1 {
            color: #333;
        }

        #output {
            white-space: pre-wrap;
            font-family: monospace;
            background-color: #fff;
            border: 1px solid #ccc;
            padding: 1em;
            border-radius: 5px;
            min-height: 100px;
        }

        .projinfo-input {
            width: 90%;
        }

        .status {
            font-weight: bold;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }

        .hidden {
            display: none;
        }

        .info {
            color: black;
        }

        .warn {
            color: darkorange;
        }

        .err {
            color: red;
        }
    </style>
    <script src="projModule.js"></script>
    <script src="projFunctions.js"></script>
</head>

<body>
    <h1>PROJ WebAssembly Transformer</h1>
    <p id="loading">Loading module... &#8987;</p>
    <div>
        <label for="args">args: </label><input type="text" id="args" name="args" required class="projinfo-input"
            placeholder="EPSG:4258" />
    </div>

    <input type="button" value="Compute" id="compute" disabled />
    <input type="button" value="Clean" id="clean" /> <span id="waiting" class="hidden">&#8987;</span>
    <div id="output"></div>

    <script>
        let last_now = performance.now();
        let h;

        const outputEl = document.getElementById('output');

        function log(message, type = 'log') {
            const statusClass = type === 'success' ? 'success' : (type === 'error' ? 'error' : '');
            outputEl.innerHTML += `<div class="${statusClass}">${message}</div>`;
            const t = type === 'success' ? 'info' : type;
            console[t](message);
        }

        function msg_log(message, type = 'log') {
            const statusClass = ['info', 'warn', 'err'].includes(type) ? type : '';
            outputEl.innerHTML += `<span class="${statusClass}">${message}</span>`;
        }

        function compute() {
            let args = document.getElementById("args").value;
            let args_list = args.match(/(?:[^\s"']+|['"][^'"]*["'])+/g)
            document.getElementById("waiting").classList.remove("hidden");
            last_now = performance.now();
            projWorker.postMessage({
                type: "projinfo",
                args: args_list,
            });
        }

        window.onload = function () {
            let p = new Proj();
            h = p;
            function show(e) {
                console.log(e);
                console.log(p.proj_info());
            }
            p.init(show);
        };
        document.getElementById("compute").addEventListener("click", compute);
        document.getElementById("clean").addEventListener("click", () => {
            function show(e) {
                //console.log(e);
            }
            //h.init(show);
            const l = h.crs_list({auth_name:""});
            console.log(l);
            console.log(h.crs_axes({ crs: "EPSG:4326+3855" }))
            let i = h.projinfo({ args: ["EPSG:4314", "EPSG:4258", "-o", "proj"], use_network: false });
            console.log(i.msg);
            const t = h.create_transformer_from_crs_to_crs({ source_crs: "EPSG:4258", target_crs: "EPSG:10290" });
            let p = t.transform({ points: [[40, 5], [41, 6, 89]] });
            t.get_last_operation();
            console.log(p);
            p.inverse = true;
            let q = t.transform(p);
            console.log(q);
            t.get_last_operation();
            t.dispose()

            document.getElementById("output").innerHTML = ""
        });
    </script>
</body>

</html>
