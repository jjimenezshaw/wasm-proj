<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJ Wasm Pthreads Test</title>

    <!-- 
      Load the Cross-Origin Isolation service worker.
      This file (coi-serviceworker.js) must be in the same directory.
      It sets the required COOP/COEP headers to enable SharedArrayBuffer (for Pthreads).
    -->
    <script src="coi-serviceworker.js"></script>

    <style>
        body { font-family: sans-serif; margin: 2em; background-color: #f4f4f4; }
        h1 { color: #333; }
        #output {
            white-space: pre-wrap;
            font-family: monospace;
            background-color: #fff;
            border: 1px solid #ccc;
            padding: 1em;
            border-radius: 5px;
            min-height: 100px;
        }
        .status { font-weight: bold; }
        .success { color: green; }
        .warn { color: darkorange; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>PROJ WebAssembly Pthreads Test</h1>
    <p id="loading">Loading module and running transformation...</p>
    <div>
        <label for="src">src: </label><input type="text" id="src" name="src"  size="90" placeholder="EPSG:4258" value="EPSG:4258"/>
        <label for="dst">dst: </label><input type="text" id="dst" name="dst"  size="10" placeholder="EPSG:5677" value="EPSG:5677"/>
    </div>
    <div>
        <label for="network">use network:</label><input type="checkbox" id="network" name="network" checked/>
    </div>
    <div>
        <label for="x">x: </label><input type="text" id="x" name="x" required size="10" placeholder="54.8" value="54.8"/>
        <label for="y">y: </label><input type="text" id="y" name="y" required size="10" placeholder="9.0" value="9.0"/>
        <label for="z">z: </label><input type="text" id="z" name="z" required size="10" placeholder="0.0" value="0.0"/>
    </div>
    <input type="button" value="Compute" id="compute" disabled/>
    <input type="button" value="Clean" id="clean"/>
    <div id="output"></div>

    <!-- 
      IMPORTANT: The coi-serviceworker.js script loaded in the <head>
      handles setting the necessary Cross-Origin Isolation headers.
    -->

    <!-- Load the Emscripten 'glue' code -->
    <script src="projModule.js"></script>
    <script>
        let huge_val = 0;
        let proj = null;
        const outputEl = document.getElementById('output');

        function log(message, type = 'log') {
            const statusClass = ['success', 'error', 'warn'].includes(type) ? type : '';
            outputEl.innerHTML += `<div class="${statusClass}">${message}</div>`;
            //const t = ['success', 'warn'].includes(type) ? 'info' : type;
            //console[t](message);
        }

        function projinf(message, type = 'log') {
            const statusClass = ['success', 'error', 'warn'].includes(type) ? type : '';
            outputEl.innerHTML += `<span class="${statusClass}">${message}</span>`;
            // const t = ['success', 'warn'].includes(type) ? 'info' : type;
            // console[t](message);
        }

        async function init() {
            log("Module factory loaded...");
            log("Checking PROJ version...");
            try {
                const major = proj._get_proj_version_major();
                const minor = proj._get_proj_version_minor();
                const patch = proj._get_proj_version_patch();
                log(`PROJ Version: ${major}.${minor}.${patch}`, 'success');
            } catch (e) {
                log(`Failed to get version: ${e.message}`, 'error');
                return false;
            }
            const dat = proj.UTF8ToString(proj._get_compilation_date());
            log(`Compilation date ${dat}`);
            huge_val = proj._get_huge_val()
            return true;
        }

        function computeTransform() {
            let ctx = null;
            let P = null;
            let sourceCRS, targetCRS;
            let coordPtr;
            try {
                // --- Create PROJ Context ---
                log("Creating PROJ context...");
                ctx = proj._proj_context_create();
                if (ctx === 0) {
                    throw new Error("proj_context_create returned NULL");
                }
                log(`Context created (ptr: ${ctx})`, 'success');

                // --- Create Transformation ---
                log("Creating transformation...");
                let enable_network = document.getElementById("network").checked;
                proj._proj_context_set_enable_network(ctx, 0); // enable network
                let src = document.getElementById("src").value;
                let dst = document.getElementById("dst").value;
                if (src == '' || dst == '') {
                     //throw new Error("src and dst must be filled");
                }
                let x = parseFloat(document.getElementById("x").value);
                let y = parseFloat(document.getElementById("y").value);
                let z = parseFloat(document.getElementById("z").value);

                // We must allocate memory for the C-strings (source and target CRS)
                sourceCRS = proj.stringToNewUTF8(src); // ETRS89
                targetCRS = proj.stringToNewUTF8(dst); // DHDN / 3-degree Gauss-Kruger zone 3 (E-N)
                //const targetCRS = proj.stringToNewUTF8("EPSG:9924"); // German height

                let last_level = 0;
                let last_msg = "";
                function process (level, msg) {
                    if (level != last_level && last_msg.length > 0) {
                        if (last_level === 1) {
                            projinf(last_msg)
                        } else if (last_level === 2) {
                            projinf(last_msg, 'warn')
                        } else if (last_level === 3) {
                            projinf(last_msg, 'error')
                        }
                        last_msg = "";
                    }
                    last_level = level;
                    last_msg += msg;
                }
                const callbackPtr = proj.addFunction(function(level, msgPtr, dataPtr) {
                    // Convert C string pointer to JS String
                    const msg = proj.UTF8ToString(msgPtr);
                    process(level, msg);
                }, 'viii');

                log("######################", 'success');
                log("projinfo " + src + "\n\n", 'success')
                let things = src.match(/(?:[^\s"']+|['"][^'"]*["'])+/g)
                const jsArgs = things ? ["projinfo"].concat(things) : ["projinfo"];
                const argc = jsArgs.length;

                // Allocate memory for the array of pointers (char**)
                // 4 bytes per pointer in Wasm (32-bit)
                const argvPtr = proj._malloc(argc * 4);

                // Keep track of allocated strings to free them later
                const allocatedStrings = [];

                jsArgs.forEach((arg, index) => {
                    // Allocate memory for the string content in C heap
                    const argPtr = proj.stringToNewUTF8(arg);
                    allocatedStrings.push(argPtr);

                    // Write the pointer to the string into our argv array
                    // (argvPtr + index * 4) is the address of the current pointer slot
                    proj.setValue(argvPtr + (index * 4), argPtr, 'i32');
                });

                let userDataPtr = 0;
                //console.log("Calling C function...");
                const result = proj._projinfo(0, argc, argvPtr, callbackPtr, userDataPtr);
                process(0, "");
                //console.log("Result code:", result);
                log("######################", result == 0 ? 'success' : 'error');

                if (false) {
                ///////////////////////////////////////////////////////////////////////
                P = proj._proj_create_crs_to_crs(
                    ctx, sourceCRS, targetCRS, 0
                );
                if (P === 0) {
                    throw new Error("proj_create_from_database returned NULL. Is proj.db embedded?");
                }
                log(`Transformation created (ptr: ${P})`, 'success');

                // Create a PROJ_COORD struct in memory
                // PJ_COORD is 4 doubles: (x, y, z, t) or (lon, lat, z, t)
                // We need 4 * 8 = 32 bytes of memory
                coordPtr = proj._malloc(32);

                // Get a view of the memory as 64-bit floats
                const coordView = new Float64Array(proj.HEAPF64.buffer, coordPtr, 4);
                coordView[0] = x;
                coordView[1] = y;
                coordView[2] = z;
                coordView[3] = huge_val; // t

                // Perform the transformation
                let res = proj._proj_trans_array(P, 1, 1, coordPtr);

                // Read the output coordinate
                const outX = coordView[0];
                const outY = coordView[1];
                const outZ = coordView[2];

                log(`Transformed: x=${outX}, y=${outY}, z=${outZ}`, 'success');
                }
            } catch (e) {
                log(`TEST FAILED: ${e.message}`, 'error');
                return;
            } finally {
                log("Cleaning up memory...");
                if (coordPtr) { proj._free(coordPtr); coordPtr = null; }
                if (P) { proj._proj_destroy(P); P = null; }
                if (sourceCRS) { proj._free(sourceCRS); sourceCRS = null; }
                if (targetCRS) { proj._free(targetCRS); targetCRS = null; }
                if (ctx) { proj._proj_context_destroy(ctx); ctx = null; }
                log("Cleanup complete.", 'success');
                log("------------------------------");
            }
        }

        // --- Module Initialization ---
        // Wrap initialization in window.onload to prevent a race condition.
        window.onload = function() {
            // Check if the factory function created the Module object
            if (typeof ProjModuleFactory === 'undefined') {
                log("Fatal Error: 'ProjModuleFactory' object not found. Did projModule.js load correctly?", 'error');
                console.error("'ProjModuleFactory' is not defined on the window object.");
                return;
            }
            ProjModuleFactory().then(module => {
                proj = module;
                if (init()) {
                    document.getElementById("compute").disabled = false;
                }
            }).catch(err => {
                log(`Failed to instantiate Wasm module: ${err}`, 'error');
                log("This often fails if the required Cross-Origin HTTP headers are not set by the server or coi-serviceworker.js.", 'error');
            });
        };
        document.getElementById("compute").addEventListener("click", computeTransform);
        document.getElementById("clean").addEventListener("click", () => document.getElementById("output").innerHTML="");
    </script>
</body>
</html>
